baseURL: "https://qiuke-qiuke.github.io/"
title: "Ke Qiu"
theme: "PaperMod"
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false
enableRobotsTXT: true
enableEmoji: true

languages:
  en:
    label: "EN"
    languageAltTitle: "British English"
    locale: "en-GB"
    weight: 1
    title: "Ke Qiu"
    menu:
      main:
        - identifier: news
          name: News
          url: "#news"
          weight: 10
        - identifier: publications
          name: Publications
          url: "#publications"
          weight: 20
        - identifier: education
          name: Education
          url: "#education"
          weight: 30
        - identifier: links
          name: Links
          url: "#links"
          weight: 40
  zh:
    label: "ZH"
    languageAltTitle: "中文"
    locale: "zh-CN"
    weight: 2
    title: "邱轲"
    params:
      author: "邱轲"
      description: "浙江大学机器人方向博士研究生，研究连续体机器人的建模、运动学、力估计与控制。"
    menu:
      main:
        - identifier: news
          name: 新闻
          url: "#news"
          weight: 10
        - identifier: publications
          name: 论文
          url: "#publications"
          weight: 20
        - identifier: education
          name: 教育经历
          url: "#education"
          weight: 30
        - identifier: links
          name: 链接
          url: "#links"
          weight: 40

pagination:
  pagerSize: 8

taxonomies:
  tag: tags
  category: categories

outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  author: "Ke Qiu"
  description: "PhD candidate in robotics at Zhejiang University, researching continuum robot modelling, kinematics, force estimation, and control."
  keywords:
    - Ke Qiu
    - robotics
    - continuum robots
    - kinematics
    - force estimation
    - Zhejiang University

  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowWordCount: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  displayFullLangName: false
  hideSummary: false
  disableSpecial1stPost: true

  socialIcons:
    - name: email
      title: Email
      url: "mailto:ke.qiu@zju.edu.cn"
    - name: googlescholar
      title: Google Scholar
      url: "https://scholar.google.com/citations?user=KTRTwDkAAAAJ&hl=en&oi=ao"
    - name: orcid
      title: ORCID
      url: "https://orcid.org/0009-0006-8700-2982"
    - name: github
      title: GitHub
      url: "https://github.com/qiuke-qiuke"
    - name: cv
      title: CV
      url: "/cv3.pdf"
      download: true

  assets:
    disableHLJS: true

  cover:
    hiddenInList: true
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
  goldmark:
    parser:
      attribute:
        block: true
        title: true
    renderer:
      unsafe: false
