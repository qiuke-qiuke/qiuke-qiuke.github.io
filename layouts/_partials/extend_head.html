<script>
  (() => {
    const storageKey = "homepage-language-scroll";
    if (!sessionStorage.getItem(storageKey)) return;

    history.scrollRestoration = "manual";
    document.documentElement.classList.add("restoring-language-scroll");

    window.languageScrollFallback = window.setTimeout(() => {
      document.documentElement.classList.remove("restoring-language-scroll");
    }, 1200);
  })();
</script>
<style>
  html.restoring-language-scroll body {
    visibility: hidden;
  }
</style>
