<div class="social-icons" {{ with .align }}align="{{ . }}"{{ end }}>
  {{- range site.Params.socialIcons }}
  <a href="{{ trim .url " " | safeURL }}"
    {{- if .download }} download{{ else }} target="_blank" rel="noopener noreferrer me"{{ end }}
    title="{{ (.title | default .name) | title }}"
    aria-label="{{ (.title | default .name) | title }}">
    {{- if eq .name "orcid" }}
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9" />
      <circle cx="8" cy="8.5" r="1" fill="currentColor" stroke="none" />
      <path d="M8 11.5V16" />
      <path d="M12 8.5V16h2a3.75 3.75 0 0 0 0-7.5z" />
    </svg>
    {{- else }}
    {{ partial "svg.html" . }}
    {{- end }}
  </a>
  {{- end }}
</div>
