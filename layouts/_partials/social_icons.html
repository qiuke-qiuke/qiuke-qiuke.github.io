<div class="social-icons" {{ with .align }}align="{{ . }}"{{ end }}>
  {{- range site.Params.socialIcons }}
  <a href="{{ trim .url " " | safeURL }}"
    {{- if .download }} download{{ else }} target="_blank" rel="noopener noreferrer me"{{ end }}
    title="{{ (.title | default .name) | title }}"
    aria-label="{{ (.title | default .name) | title }}">
    {{ partial "svg.html" . }}
  </a>
  {{- end }}
</div>
